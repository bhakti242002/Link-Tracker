<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Link Tracker</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:#f4f5f7; color:#1a1a2e; padding:32px; }

    /* ── Auth screens ── */
    .auth-wrap { display:flex; align-items:center; justify-content:center;
                 min-height:80vh; }
    .auth-box  { background:white; border-radius:12px; padding:40px;
                 width:100%; max-width:400px;
                 box-shadow:0 2px 12px rgba(0,0,0,0.08); }
    .auth-box h1 { font-size:1.4rem; margin-bottom:6px; }
    .auth-box p  { font-size:0.88rem; color:#888; margin-bottom:24px; }
    .auth-box input {
      width:100%; padding:10px 14px; border:1px solid #ddd;
      border-radius:7px; font-size:0.95rem; margin-bottom:12px; outline:none;
    }
    .auth-box input:focus { border-color:#4f6ef7; }
    .auth-box .btn-primary {
      width:100%; padding:11px; background:#4f6ef7; color:white;
      border:none; border-radius:7px; font-size:0.95rem;
      font-weight:600; cursor:pointer; margin-bottom:12px;
    }
    .auth-box .btn-primary:hover { background:#3a57d4; }
    .auth-box .switch { font-size:0.85rem; color:#888; text-align:center; }
    .auth-box .switch a { color:#4f6ef7; cursor:pointer; text-decoration:none; }
    .error-msg { color:#c0392b; font-size:0.85rem; margin-bottom:10px;
                 display:none; }

    /* ── Main dashboard ── */
    .top-bar { display:flex; justify-content:space-between;
               align-items:center; margin-bottom:24px; }
    .top-bar h1 { font-size:1.5rem; }
    .top-bar .user-info { font-size:0.88rem; color:#888; display:flex;
                          align-items:center; gap:12px; }
    .top-bar .logout-btn {
      padding:7px 14px; background:white; border:1px solid #ddd;
      border-radius:7px; font-size:0.85rem; cursor:pointer; color:#555;
    }
    .top-bar .logout-btn:hover { background:#fafafa; }

    .shorten-box { background:white; border-radius:10px; padding:20px 24px;
                   margin-bottom:28px; box-shadow:0 1px 4px rgba(0,0,0,0.08);
                   display:flex; gap:10px; flex-direction:column; }
    .shorten-row { display:flex; gap:10px; }
    .shorten-box input { flex:1; padding:10px 14px; border:1px solid #ddd;
                         border-radius:7px; font-size:0.95rem; outline:none; }
    .shorten-box input:focus { border-color:#4f6ef7; }
    .shorten-box button { padding:10px 20px; background:#4f6ef7; color:white;
                          border:none; border-radius:7px; font-size:0.95rem;
                          cursor:pointer; white-space:nowrap; }
    .shorten-box button:hover { background:#3a57d4; }
    .new-link-result { font-size:0.88rem; color:#4f6ef7; display:none; }

    .card { background:white; border-radius:10px;
            box-shadow:0 1px 4px rgba(0,0,0,0.08);
            overflow:hidden; margin-bottom:28px; }
    table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    thead { background:#f0f2ff; }
    th { text-align:left; padding:12px 16px; font-weight:600; color:#555;
         font-size:0.78rem; text-transform:uppercase; letter-spacing:.04em; }
    td { padding:12px 16px; border-top:1px solid #f0f0f0; }
    tr:hover td { background:#fafbff; cursor:pointer; }

    .badge { display:inline-block; padding:2px 8px; border-radius:99px;
             font-size:0.78rem; font-weight:600; }
    .badge-green { background:#e6f9f0; color:#1a8a4a; }
    .badge-red   { background:#fdecea; color:#c0392b; }
    .badge-gray  { background:#f0f0f0; color:#888; }
    .badge-blue  { background:#e8eeff; color:#4f6ef7; }

    .short-url   { color:#4f6ef7; font-family:monospace; font-size:0.85rem; }
    .original-url { max-width:220px; overflow:hidden; text-overflow:ellipsis;
                    white-space:nowrap; color:#555; font-size:0.85rem; }

    .detail-panel { display:none; background:white; border-radius:10px;
                    box-shadow:0 1px 4px rgba(0,0,0,0.08);
                    padding:24px; margin-bottom:28px; }
    .detail-panel h2 { font-size:1.1rem; margin-bottom:16px;
                       display:flex; justify-content:space-between; align-items:center; }
    .detail-panel h2 button { background:none; border:none; font-size:1.2rem;
                              cursor:pointer; color:#aaa; }
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr);
                  gap:12px; margin-bottom:20px; }
    .stat-box { background:#f4f5f7; border-radius:8px; padding:14px; text-align:center; }
    .stat-box .num { font-size:1.6rem; font-weight:700; }
    .stat-box .lbl { font-size:0.78rem; color:#888; margin-top:2px; }
    .mono  { font-family:monospace; font-size:0.82rem; color:#888; }
    .empty { padding:32px; text-align:center; color:#aaa; }
  </style>
</head>
<body>

<!-- ── Login screen ── -->
<div class="auth-wrap" id="loginScreen">
  <div class="auth-box">
    <h1>🔗 Link Tracker</h1>
    <p>Sign in to your account</p>
    <div class="error-msg" id="loginError"></div>
    <input id="loginUser" type="text"     placeholder="Username" />
    <input id="loginPass" type="password" placeholder="Password" />
    <button class="btn-primary" onclick="doLogin()">Sign in</button>
    <div class="switch">Don't have an account?
      <a onclick="showRegister()">Register</a>
    </div>
  </div>
</div>

<!-- ── Register screen ── -->
<div class="auth-wrap" id="registerScreen" style="display:none">
  <div class="auth-box">
    <h1>🔗 Create account</h1>
    <p>Start tracking your links</p>
    <div class="error-msg" id="registerError"></div>
    <input id="regUser" type="text"     placeholder="Username" />
    <input id="regPass" type="password" placeholder="Password (min 6 chars)" />
    <button class="btn-primary" onclick="doRegister()">Create account</button>
    <div class="switch">Already have an account?
      <a onclick="showLogin()">Sign in</a>
    </div>
  </div>
</div>

<!-- ── Main dashboard ── -->
<div id="mainDash" style="display:none">
  <div class="top-bar">
    <h1>🔗 Link Tracker</h1>
    <div class="user-info">
      <span id="usernameLabel"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="shorten-box">
    <div class="shorten-row">
      <input id="urlInput" type="text" placeholder="Paste a URL to shorten..." />
      <button onclick="shortenUrl()">Shorten</button>
    </div>
    <div class="new-link-result" id="newLinkResult"></div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Short URL</th><th>Original URL</th><th>Unique Humans</th>
          <th>Total Clicks</th><th>Bots</th><th>Status</th>
          <th>Created</th><th>Expires</th>
        </tr>
      </thead>
      <tbody id="linksBody">
        <tr><td colspan="8" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="detail-panel" id="detailPanel">
    <h2>
      <span id="detailTitle">Details</span>
      <button onclick="closeDetail()">✕</button>
    </h2>
    <div class="stats-grid" id="statsGrid"></div>
    <table>
      <thead>
        <tr><th>Timestamp</th><th>Fingerprint</th><th>Bot?</th><th>Duplicate?</th></tr>
      </thead>
      <tbody id="recentBody"></tbody>
    </table>
  </div>
</div>

<script>
  const BASE = "";

  // ── Auth state ─────────────────────────────────────────────────────────────
  async function checkSession() {
    try {
      const res = await fetch(`${BASE}/me`);
      if (res.ok) {
        const data = await res.json();
        showDashboard(data.username);
      } else {
        showLogin();
      }
    } catch { showLogin(); }
  }

  function showLogin()    {
    document.getElementById("loginScreen").style.display    = "flex";
    document.getElementById("registerScreen").style.display = "none";
    document.getElementById("mainDash").style.display       = "none";
  }
  function showRegister() {
    document.getElementById("loginScreen").style.display    = "none";
    document.getElementById("registerScreen").style.display = "flex";
    document.getElementById("mainDash").style.display       = "none";
  }
  function showDashboard(username) {
    document.getElementById("loginScreen").style.display    = "none";
    document.getElementById("registerScreen").style.display = "none";
    document.getElementById("mainDash").style.display       = "block";
    document.getElementById("usernameLabel").textContent    = username;
    loadLinks();
  }

  async function doLogin() {
    const username = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value.trim();
    const errEl    = document.getElementById("loginError");
    errEl.style.display = "none";

    const res  = await fetch(`${BASE}/login`, {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) { showDashboard(data.username); }
    else { errEl.textContent = data.error; errEl.style.display = "block"; }
  }

  async function doRegister() {
    const username = document.getElementById("regUser").value.trim();
    const password = document.getElementById("regPass").value.trim();
    const errEl    = document.getElementById("registerError");
    errEl.style.display = "none";

    const res  = await fetch(`${BASE}/register`, {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) { showDashboard(data.username); }
    else { errEl.textContent = data.error; errEl.style.display = "block"; }
  }

  async function doLogout() {
    await fetch(`${BASE}/logout`, { method: "POST", credentials: "include" });
    showLogin();
  }

  // ── Dashboard ──────────────────────────────────────────────────────────────
  async function loadLinks() {
    const res   = await fetch(`${BASE}/links`, { credentials: "include" });
    const data  = await res.json();
    const links = data.links || [];
    const tbody = document.getElementById("linksBody");

    if (!links.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty">No links yet. Shorten one above!</td></tr>`;
      return;
    }

    const stats = await Promise.all(links.map(id =>
      fetch(`${BASE}/stats/${id}`, { credentials: "include" }).then(r => r.json())
    ));

    tbody.innerHTML = stats.map(s => `
      <tr onclick="showDetail('${s.id}')">
        <td><span class="short-url">/r/${s.id}</span></td>
        <td><div class="original-url" title="${s.original_url}">${s.original_url}</div></td>
        <td><span class="badge badge-blue">${s.unique_humans ?? 0}</span></td>
        <td>${s.total_clicks}</td>
        <td>${s.bot_clicks}</td>
        <td>${s.expired
          ? `<span class="badge badge-red">Expired</span>`
          : s.stale
          ? `<span class="badge badge-red">Stale</span>`
          : `<span class="badge badge-green">Active</span>`}</td>
        <td class="mono">${s.created_at.slice(0,10)}</td>
        <td class="mono">${s.expires_at.slice(0,10)}</td>
      </tr>`).join("");
  }

  async function shortenUrl() {
    const url   = document.getElementById("urlInput").value.trim();
    const resEl = document.getElementById("newLinkResult");
    if (!url.startsWith("http")) { alert("Enter a valid URL"); return; }

    const res  = await fetch(`${BASE}/shorten`, {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    resEl.style.display = "block";
    resEl.innerHTML = `✅ <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
    document.getElementById("urlInput").value = "";
    loadLinks();
  }

  async function showDetail(id) {
    const res = await fetch(`${BASE}/stats/${id}`, { credentials: "include" });
    const s   = await res.json();
    document.getElementById("detailTitle").textContent = `Details — /r/${id}`;
    document.getElementById("statsGrid").innerHTML = `
      <div class="stat-box"><div class="num">${s.unique_humans ?? 0}</div><div class="lbl">Unique Humans</div></div>
      <div class="stat-box"><div class="num">${s.human_clicks}</div><div class="lbl">Total Human Clicks</div></div>
      <div class="stat-box"><div class="num">${s.duplicate_clicks ?? 0}</div><div class="lbl">Duplicates</div></div>
      <div class="stat-box"><div class="num">${s.bot_clicks}</div><div class="lbl">Bot Prefetches</div></div>`;
    document.getElementById("recentBody").innerHTML = (s.recent || []).map(c => `
      <tr>
        <td class="mono">${c.timestamp.slice(0,19).replace("T"," ")}</td>
        <td class="mono">${c.fingerprint ?? "—"}</td>
        <td>${c.is_bot      ? `<span class="badge badge-red">Yes</span>`   : `<span class="badge badge-gray">No</span>`}</td>
        <td>${c.is_duplicate? `<span class="badge badge-red">Yes</span>`   : `<span class="badge badge-green">No</span>`}</td>
      </tr>`).join("") || `<tr><td colspan="4" class="empty">No clicks yet</td></tr>`;
    document.getElementById("detailPanel").style.display = "block";
    document.getElementById("detailPanel").scrollIntoView({ behavior: "smooth" });
  }

  function closeDetail() {
    document.getElementById("detailPanel").style.display = "none";
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("urlInput")
      .addEventListener("keydown", e => { if (e.key === "Enter") shortenUrl(); });
    checkSession();
  });
</script>
</body>
</html>
